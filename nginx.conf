server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Résolution DNS à la requête (pas au démarrage) — requis quand backend peut redémarrer
    resolver 127.0.0.11 valid=10s;

    # Reverse proxy vers le backend FastAPI
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE support (training events stream)
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # SPA routing — toutes les routes inconnues → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
